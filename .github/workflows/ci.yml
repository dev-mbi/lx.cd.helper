name: Matrix CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main

  workflow_dispatch:


# Cancel old runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:

  test:
    name: Test Node ${{ matrix.node-version }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 16
          - 18
          - 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm


      - name: Install dependencies
        run: npm install


      - name: Run tests
        run: npm test


      - name: Save test results
        run: |
          mkdir -p test-results
          echo "Node ${{ matrix.node-version }} tests passed" > test-results/result-${{ matrix.node-version }}.txt


      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/


  build:
    name: Build Project

    runs-on: ubuntu-latest

    needs:
      - test

    if: |
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      - name: Install dependencies
        run: npm install


      - name: Build project
        run: npm run build


      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/


  summary:
    name: Test Summary

    runs-on: ubuntu-latest

    needs:
      - test


    steps:

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-node-*
          merge-multiple: true


      - name: Create summary
        run: |
          echo "## Matrix Test Results" >> $GITHUB_STEP_SUMMARY
          cat test-results/*.txt >> $GITHUB_STEP_SUMMARY
